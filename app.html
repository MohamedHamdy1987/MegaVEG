<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg"></div>

  <aside class="sidebar">
    <div class="logo">🍎 <span>Market Pro</span></div>
    <nav class="menu">
      <button onclick="navigate('dashboard')">📊 الرئيسية</button>
      <button onclick="navigate('invoices')">📄 الفواتير</button>
      <button onclick="navigate('sales')">🛒 المبيعات</button>
      <button onclick="navigate('customers')">👥 العملاء</button>
      <button onclick="navigate('suppliers')">🚚 الموردين</button>
      <button onclick="navigate('tarhil')">📋 الترحيلات</button>
      <button onclick="navigate('khazna')">💰 الخزنة</button>
      <button onclick="navigate('financial')">🏦 المركز المالي</button>
      <button onclick="navigate('partners')">🤝 الشركاء</button>
      <button onclick="navigate('market_shops')">🏬 محلات السوق</button>
      <button onclick="navigate('employees')">👷 الموظفين</button>
    </nav>
    <div class="sidebar-footer"><p>⚡ v3.0</p></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="left"><h3 id="page-title">الرئيسية</h3></div>
      <div class="right"><input type="text" placeholder="بحث..." class="search"><div class="user">👤</div></div>
    </header>
    <section id="app" class="content fade-in"></section>
  </main>

  <div id="modal" class="modal hidden"></div>
  <div id="toast"></div>

  <div class="mobile-nav">
    <button onclick="navigate('dashboard')">🏠</button>
    <button onclick="navigate('sales')">🛒</button>
    <button onclick="navigate('invoices')">📄</button>
    <button onclick="navigate('customers')">👥</button>
    <button onclick="navigate('khazna')">💰</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
