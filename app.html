<body>

    <div class="menu-section">
      <div class="menu-label">العمليات</div>
      <button data-nav="invoices">📄 الفواتير</button>
      <button data-nav="sales">🛒 المبيعات</button>
      <button data-nav="tarhil">📋 الترحيلات</button>
    </div>

    <div class="menu-section">
      <div class="menu-label">الأطراف</div>
      <button data-nav="customers">👥 العملاء</button>

      <button data-nav="market_shops">🏬 محلات السوق</button>

      <button data-nav="khazna">💰 الخزنة</button>

<main class="main">

<header class="topbar">

  <div class="search-wrap">
    <input type="search" id="global-search" placeholder="بحث..." class="search">
  </div>

    <button onclick="navigate('khazna')">💰</button>
  </div>
</header>

<section id="app" class="content fade-in"></section>

</main>


<div id="modal" class="modal hidden">
  <div id="modal-body"></div>
</div>

<div id="toast"></div>

<div id="global-loader" class="loader hidden">
  <div class="spinner"></div>
</div>


<!-- Install Prompt -->
<div id="install-prompt"
style="
display:none;
position:fixed;
bottom:80px;
right:16px;
left:16px;
background:#022c22;
border-radius:16px;
padding:16px;
z-index:900;
">
  <div style="font-weight:bold;">📱 ثبّت Market Pro</div>

  <div style="margin-top:8px;">
    يعمل كتطبيق حتى بدون إنترنت
  </div>

  <div style="display:flex;gap:10px;margin-top:12px;">
    <button class="btn" onclick="installPWA()">تثبيت</button>
    <button class="btn btn-sm" onclick="dismissInstall()">لاحقاً</button>
  </div>
</div>


<nav class="mobile-nav">
<button data-nav="dashboard">🏠</button>
<button data-nav="sales">🛒</button>
<button data-nav="invoices">📄</button>
<button data-nav="customers">👥</button>
<button data-nav="khazna">💰</button>
</nav>



<script>
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
 e.preventDefault();
 deferredPrompt=e;

 if(!localStorage.getItem("pwa-dismissed")){
   setTimeout(()=>{
    document.getElementById("install-prompt").style.display="block";
   },4000);
 }
});

window.installPWA=async function(){
 if(!deferredPrompt) return;

 document.getElementById("install-prompt").style.display="none";

 deferredPrompt.prompt();

 deferredPrompt=null;
};

window.dismissInstall=function(){
 document.getElementById("install-prompt").style.display="none";
 localStorage.setItem("pwa-dismissed","1");
};

</script>


<script>

if("serviceWorker" in navigator){

 window.addEventListener("load",()=>{

   /* تم تعديل /sw.js إلى ./sw.js */
   navigator.serviceWorker.register("./sw.js")

   .then(reg=>{

      reg.addEventListener("updatefound",()=>{

       const nw=reg.installing;

       nw.addEventListener("statechange",()=>{

         if(
           nw.state==="installed"
           &&
           navigator.serviceWorker.controller
         ){

          const t=document.getElementById("toast");

          if(t){

           const el=document.createElement("div");

           el.className="toast";

           el.innerHTML=
           '🔄 تحديث جديد — <button onclick="location.reload()">تحديث</button>';

           t.appendChild(el);

          }

         }

       });

      });

   });

 });

}

window.signOut=async function(){

 const {supabase}=await import("./data.js");

 await supabase.auth.signOut();

 location.href="index.html";

};

</script>


<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script type="module" src="app.js"></script>

</body>
